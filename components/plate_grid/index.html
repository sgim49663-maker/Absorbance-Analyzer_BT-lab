<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; padding: 8px; background: transparent; }

.legend {
    display: flex; gap: 14px; margin-bottom: 10px; font-size: 12px;
    align-items: center; flex-wrap: wrap;
}
.legend-item { display: flex; align-items: center; gap: 5px; }
.legend-swatch {
    width: 15px; height: 15px; border-radius: 3px;
    border: 1px solid #ccc; display: inline-block;
}
.drag-hint { margin-left: auto; color: #999; font-size: 11px; }

.plate-grid {
    border-collapse: collapse;
    user-select: none; -webkit-user-select: none;
    margin: 0 auto;
}
.plate-grid td, .plate-grid th {
    width: 64px; height: 44px;
    text-align: center; font-size: 10px;
    border: 1px solid #ddd; padding: 2px;
    transition: background 0.08s;
}
.plate-grid th {
    background: #f5f6f8; font-weight: 600;
    color: #666; font-size: 11px; cursor: default;
}
.plate-grid td { cursor: crosshair; position: relative; }

/* Well type colors */
.well-BL  { background: #B0BEC5 !important; color: #fff !important; }
.well-NC  { background: #78909C !important; color: #fff !important; }
.well-PC  { background: #FFAB91 !important; color: #bf360c !important; }
.well-ST  { background: #FFF9C4 !important; color: #333 !important; }
.well-SM  { background: #C8E6C9 !important; color: #1b5e20 !important; }
.well-empty { background: #FAFAFA; color: #aaa; }

/* Selection overlay */
.well-selecting {
    outline: 3px solid #1565C0 !important;
    outline-offset: -3px;
    background: rgba(187, 222, 251, 0.7) !important;
    z-index: 1;
}

.label { font-weight: 700; font-size: 10px; display: block; line-height: 1.2; }
.value { font-size: 8.5px; opacity: 0.75; display: block; line-height: 1.2; margin-top: 1px; }
</style>
</head>
<body>

<div class="legend">
    <span class="legend-item"><span class="legend-swatch" style="background:#B0BEC5"></span>Blank</span>
    <span class="legend-item"><span class="legend-swatch" style="background:#FFF9C4;border-color:#e0c600"></span>Standard</span>
    <span class="legend-item"><span class="legend-swatch" style="background:#78909C"></span>Neg.Ctrl</span>
    <span class="legend-item"><span class="legend-swatch" style="background:#FFAB91"></span>Pos.Ctrl</span>
    <span class="legend-item"><span class="legend-swatch" style="background:#C8E6C9"></span>Sample</span>
    <span class="drag-hint">&#128433; 드래그하여 웰 선택</span>
</div>

<table class="plate-grid" id="plateGrid"></table>

<script>
function sendValue(value) {
    window.parent.postMessage(
        { isStreamlitMessage: true, type: "streamlit:setComponentValue", value: value }, "*"
    );
}
function setFrameHeight(h) {
    window.parent.postMessage(
        { isStreamlitMessage: true, type: "streamlit:setFrameHeight", height: h }, "*"
    );
}
function componentReady() {
    window.parent.postMessage(
        { isStreamlitMessage: true, type: "streamlit:componentReady", apiVersion: 1 }, "*"
    );
}

const ROWS = "ABCDEFGH".split("");
const COLS = Array.from({ length: 12 }, (_, i) => String(i + 1));

let isDragging = false;
let startCell = null;
let selectedCells = new Set();
let plateData = null;
let wellMap = {};

window.addEventListener("message", (event) => {
    if (event.data.type !== "streamlit:render") return;
    const args = event.data.args || {};
    plateData = args.plate_values || null;
    wellMap = args.well_map || {};
    renderGrid();
    requestAnimationFrame(() => {
        setFrameHeight(document.body.scrollHeight + 16);
    });
});

function renderGrid() {
    const grid = document.getElementById("plateGrid");
    let html = "<tr><th></th>";
    COLS.forEach(c => { html += "<th>" + c + "</th>"; });
    html += "</tr>";

    ROWS.forEach((r, ri) => {
        html += "<tr><th>" + r + "</th>";
        COLS.forEach((c, ci) => {
            const wellId = r + c;
            const info = wellMap[wellId] || null;
            let val = "";
            if (plateData && plateData[ri] != null && plateData[ri][ci] != null) {
                val = plateData[ri][ci];
            }
            const valStr = (typeof val === "number") ? val.toFixed(4) : String(val);

            let cls = "well-empty";
            let labelHtml = "";
            if (info) {
                cls = "well-" + info.type;
                const lbl = info.label || info.type;
                labelHtml = '<span class="label">' + lbl + '</span>';
            }

            html += '<td class="' + cls + '" data-well="' + wellId +
                    '" data-row="' + ri + '" data-col="' + ci + '">' +
                    labelHtml +
                    '<span class="value">' + valStr + '</span></td>';
        });
        html += "</tr>";
    });

    grid.innerHTML = html;
    attachDragEvents();
}

function attachDragEvents() {
    const cells = document.querySelectorAll("#plateGrid td[data-well]");

    cells.forEach(cell => {
        cell.addEventListener("mousedown", (e) => {
            e.preventDefault();
            isDragging = true;
            startCell = { row: +cell.dataset.row, col: +cell.dataset.col };
            selectedCells.clear();
            updateSelectionHighlight(startCell, startCell);
        });

        cell.addEventListener("mouseenter", () => {
            if (!isDragging || !startCell) return;
            const endCell = { row: +cell.dataset.row, col: +cell.dataset.col };
            updateSelectionHighlight(startCell, endCell);
        });
    });

    document.addEventListener("mouseup", onMouseUp);
}

function onMouseUp() {
    if (isDragging && selectedCells.size > 0) {
        sendValue({ wells: Array.from(selectedCells), ts: Date.now() });
    }
    isDragging = false;
    startCell = null;
    setTimeout(() => {
        document.querySelectorAll(".well-selecting").forEach(el => {
            el.classList.remove("well-selecting");
        });
    }, 150);
}

function updateSelectionHighlight(start, end) {
    document.querySelectorAll(".well-selecting").forEach(el => {
        el.classList.remove("well-selecting");
    });
    selectedCells.clear();

    const minRow = Math.min(start.row, end.row);
    const maxRow = Math.max(start.row, end.row);
    const minCol = Math.min(start.col, end.col);
    const maxCol = Math.max(start.col, end.col);

    for (let r = minRow; r <= maxRow; r++) {
        for (let c = minCol; c <= maxCol; c++) {
            const wellId = ROWS[r] + COLS[c];
            selectedCells.add(wellId);
            const td = document.querySelector('td[data-well="' + wellId + '"]');
            if (td) td.classList.add("well-selecting");
        }
    }
}

componentReady();
</script>
</body>
</html>
